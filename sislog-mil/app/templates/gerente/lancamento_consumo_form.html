{% extends "base.html" %}
{% block title %}Editar lançamento — {{ ex.nome }}{% endblock %}
{% block body %}
<div class="topbar">
  <div class="brand">
    <div>
      <span class="eyebrow">{{ ex.nome }}</span>
      <h1>Editar consumo</h1>
    </div>
  </div>
  <div class="actions">
    <a class="btn btn-sm" href="/gerente/exercicios/{{ ex.id }}/lancamentos">Voltar</a>
  </div>
</div>

<div class="container">
  <div class="card" style="max-width:460px;">
    <p class="hint">{{ lanc.item.categoria.nome }} — {{ lanc.item.nome }} — {{ lanc.data.strftime('%d/%m/%Y') }} — lançado por {{ lanc.usuario.nome }}</p>
    <form class="stack" method="post" action="/gerente/exercicios/{{ ex.id }}/lancamentos/consumo/{{ lanc.id }}/editar">
      <div>
        <label>Quantidade ({{ lanc.item.unidade }})</label>
        <input type="number" step="0.01" name="quantidade" value="{{ lanc.quantidade }}" required>
      </div>
      <button class="btn btn-primary" type="submit">Salvar</button>
    </form>
    <form method="post" action="/gerente/exercicios/{{ ex.id }}/lancamentos/consumo/{{ lanc.id }}/excluir"
          onsubmit="return confirm('Excluir este lançamento?');" style="margin-top:10px;">
      <button class="btn btn-danger" type="submit">Excluir lançamento</button>
    </form>
  </div>
</div>
{% endblock %}
