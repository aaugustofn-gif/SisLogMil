{% extends "base.html" %}
{% block title %}Nova categoria — {{ ex.nome }}{% endblock %}
{% block body %}
<div class="topbar">
  <div class="brand">
    <div>
      <span class="eyebrow">{{ ex.nome }}</span>
      <h1>Nova categoria</h1>
    </div>
  </div>
  <div class="actions">
    <a class="btn btn-sm" href="/gerente/exercicios/{{ ex.id }}/categorias">Voltar</a>
  </div>
</div>

<div class="container">
  {% if erro %}<p class="error">{{ erro }}</p>{% endif %}
  <div class="card" style="max-width:460px;">
    <form class="stack" method="post" action="/gerente/exercicios/{{ ex.id }}/categorias/nova">
      <div>
        <label>Nome da categoria</label>
        <input type="text" name="nome" placeholder="Ex: Meios, Munição, Alimentação..." required>
      </div>
      <div>
        <label>Tipo de gráfico no painel público</label>
        <select name="tipo_grafico" required>
          <option value="disponibilidade">Disponibilidade (pizza — disponível x indisponível)</option>
          <option value="consumo">Consumo (linha — acumulado x autorizado)</option>
        </select>
      </div>
      <button class="btn btn-primary" type="submit">Criar categoria</button>
    </form>
  </div>
</div>
{% endblock %}
