{% extends "base.html" %}
{% block title %}Entrar — SisLog Mil{% endblock %}
{% block body %}
<div class="login-wrap">
  <div class="login-card">
    <h1>SisLog Mil</h1>
    <p class="hint" style="margin-top:-8px;margin-bottom:20px;">Entre com seu login e senha</p>
    {% if erro %}<p class="error">{{ erro }}</p>{% endif %}
    <form class="stack" method="post" action="/login">
      <div>
        <label>Login</label>
        <input type="text" name="login" required autofocus>
      </div>
      <div>
        <label>Senha</label>
        <input type="password" name="senha" required>
      </div>
      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
    <p class="hint" style="margin-top:18px;">
      Quer só consultar os resultados de um exercício? <a href="/painel" style="color:#3b82f6;">Acessar painel público</a>
    </p>
  </div>
</div>
{% endblock %}
